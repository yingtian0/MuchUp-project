static_resources:
  listeners:
    - name: public_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8100
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                upgrade_configs:
                  - upgrade_type: websocket
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: muchup_api
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/ws/"
                          route:
                            cluster: ws_app
                            timeout: 0s
                          typed_per_filter_config:
                            envoy.filters.http.grpc_json_transcoder:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_json_transcoder.v3.GrpcJsonTranscoderPerRoute
                              disabled: true
                        - match:
                            prefix: "/v1/auth/"
                          route:
                            cluster: authz_grpc
                            timeout: 0s
                        - match:
                            prefix: "/v1/chat/"
                          route:
                            cluster: app_grpc
                            timeout: 0s
                        - match:
                            prefix: "/health"
                          route:
                            cluster: app_http
                            timeout: 0s
                          typed_per_filter_config:
                            envoy.filters.http.grpc_json_transcoder:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_json_transcoder.v3.GrpcJsonTranscoderPerRoute
                              disabled: true
                http_filters:
                  - name: envoy.filters.http.grpc_json_transcoder
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_json_transcoder.v3.GrpcJsonTranscoder
                      proto_descriptor: /etc/envoy/proto/api.pb
                      services:
                        - auth.v1.AuthService
                        - chat.v1.ChatService
                      match_incoming_request_route: true
                      auto_mapping: false
                      ignore_unknown_query_parameters: true
                      convert_grpc_status: true
                      print_options:
                        add_whitespace: false
                        always_print_primitive_fields: false
                        preserve_proto_field_names: true
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: authz_grpc
      connect_timeout: 5s
      type: LOGICAL_DNS
      lb_policy: ROUND_ROBIN
      http2_protocol_options: {}
      load_assignment:
        cluster_name: authz_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: authz-service
                      port_value: 9000

    - name: app_grpc
      connect_timeout: 5s
      type: LOGICAL_DNS
      lb_policy: ROUND_ROBIN
      http2_protocol_options: {}
      load_assignment:
        cluster_name: app_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: app
                      port_value: 9000

    - name: ws_app
      connect_timeout: 5s
      type: LOGICAL_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: ws_app
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: app
                      port_value: 8080

    - name: app_http
      connect_timeout: 5s
      type: LOGICAL_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: app_http
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: app
                      port_value: 8080

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
