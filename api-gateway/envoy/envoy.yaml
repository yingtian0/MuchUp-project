static_resources:
  listeners:
    - name: HTTPListener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8100
      filter_chains:
        - filers:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                upgrade_configs:
                  - upgrade_type: websocket
                route_config:
                  virtual_hosts:
                    - name: muchup-api
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/ws/chat/"
                          route:
                            cluster: ws_backend
                        - match:
                            prefix: "/auth/"
                          route:
                            cluster: auth_backend

                http_filters:
                  - name: envoy.filters.http.jwt_authn
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                      providers:
                        google_authz:
                          issuer: "https://accounts.google.com"
                          audiences:
                            - "YOUR_GOOGLE_CLIENT_ID"
                        remote_jwks:
                          http_uri:
                            uri: "https://www.googleapis.com/oauth2/v3/certs"
                            cluster: google_jwks
                            timeout: 5s
                        from_headers:
                          - name: Authorization
                            value_prefix: "Bearer "
                        payload_in_metadata: jwt_payload
                    rules:
                      - match:
                          prefix: "/ws/chat/"
                        requires:
                          provider_name: google_authz

                  - name: envoy.filters.http.router

  cluster:
    - name: ws_backend
      connect_timeout: 5s
      type: logical_dns
      lb_policy: round_robin
      load_assignment:
        cluster_name: ws_backend
        endpoint:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: bakend
                      port_value: 8070

    - name: auth_backend
      connect_timeout: 5s
      type: logical_dns
      lb_policy: round_robin
      load_assignment:
        cluster_name: auth_backend
        endpoint:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: authz-service
                      port_value: 8099

    - name: google_jwks
      connect_timeout: 5s
      type: logical_dns
      lb_policy: round_robin
      load_assignment:
        cluster_name: google_jwks
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: www.googleapis.com
                      port_balue: 443
      transport_socket:
        name: envoy.transport_sockets.tls
