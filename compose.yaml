  services:
    db:
      image: postgres:16
      container_name: muchup-db
      restart: unless-stopped
      environment:
        POSTGRES_USER: ${DB_USER}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
      ports:
        - "${DB_PORT}:5432"
    
    app:
      build: ./app
      environment:
        DB_HOST: db
        DB_USER: ${DB_USER}
        DB_PASSWORD:  ${DB_PASSWORD}
        RUN_DB_MIGRATION: ${RUN_DB_MIGRATION}
        DB_NAME: ${DB_NAME}
        DB_PORT: 5432
        SERVER_PORT: 8080
        GRPC_PORT: 9000
  volumes:
    postgres_data: