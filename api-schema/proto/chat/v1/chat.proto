syntax = "proto3";

package chat.v1;

import "google/api/annotations.proto";

option go_package = "github.com/MuchUp-monorepo/gen/go/chat/v1";

service ChatService {
  rpc GetMessages (GetMessagesRequest) returns (GetMessagesResponse) {
    option (google.api.http) = {
      get: "/v1/chat/rooms/{room_id}/messages"
    };
  }

  // Chat delivery itself is handled over WebSocket, so this RPC is not
  // exposed through Envoy's REST transcoding.
  // rpc SendMessage (SendMessageRequest) returns (SendMessageResponse);

  rpc MatchRoom (MatchRoomRequest) returns (MatchRoomResponse) {
    option (google.api.http) = {
      post: "/v1/chat/match"
      body: "*"
    };
  }
}

message Message {
  string message_id = 1;
  string sender_id = 2;
  string text = 3;
  // Unix time in seconds.
  int64 created_at = 4;
}

message GetMessagesRequest {
  string room_id = 2;
}

message GetMessagesResponse {
  repeated Message message = 1;
}

message SendMessageRequest {
  reserved 1;
  reserved "user_id";

  string room_id = 2;
  string text = 3;
}

message SendMessageResponse {
  string room_id = 1;
  string message_id = 2;
  // Unix time in seconds.
  int64 created_at = 3;
}


message MatchRoomRequest {
  reserved 1;
  reserved "user_id";
}

message MatchRoomResponse {
  string owner_id = 1;
  reserved 2;
  reserved "rooom_id";

  string room_id = 3;
}
