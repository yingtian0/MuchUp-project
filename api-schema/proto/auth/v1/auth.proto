syntax = "proto3";

package auth.v1;

import "google/api/annotations.proto";

option go_package = "github.com/MuchUp-monorepo/gen/go/auth/v1;authv1";

service AuthService {

  rpc SignUp (SignUpRequest) returns (SignUpResponse) {
    option (google.api.http) = {
      post: "/v1/auth/signup"
      body: "*"
    };
  }

  rpc Login (LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  }
}

message SignUpRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message SignUpResponse {
  string user_id = 1;
  string username = 2;
  string token = 3;
}


message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string user_id = 1;
  string username = 2;
  string token = 3;
}
