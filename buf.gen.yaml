version: v2
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt:
      - paths=source_relative

  - local: protoc-gen-go
    out: app/proto/gen/go
    opt:
      - paths=source_relative

  - local: protoc-gen-go-grpc
    out: gen/go
    opt:
      - paths=source_relative

  - local: protoc-gen-go-grpc
    out: app/proto/gen/go
    opt:
      - paths=source_relative
